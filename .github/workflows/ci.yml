name: LexiVocab API CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: LexiVocabDB_Test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: ${{ runner.os }}-nuget-
        
    - name: Restore dependencies
      run: dotnet restore ./LexiVocabAPI.slnx

    - name: Build
      run: dotnet build ./LexiVocabAPI.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test ./LexiVocabAPI.slnx --no-build --verbosity normal --configuration Release
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=LexiVocabDB_Test;Username=postgres;Password=password"
        ConnectionStrings__Redis: "localhost:6379"
        Jwt__Secret: "CI_Test_Secret_Key_Must_Be_At_Least_32_Characters_Long!"

    - name: Security scan (SCA)
      run: dotnet list ./LexiVocabAPI.slnx package --vulnerable --include-transitive
      continue-on-error: true

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/lexivocab-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/lexivocab-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
