<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiVocab - Industrial AI Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --bg: #030712;
            --side: #0f172a;
            --card: rgba(30, 41, 59, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Lateral Menu */
        .sidebar {
            width: 280px;
            background: var(--side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-group { margin-bottom: 32px; }
        .config-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 16px; display: block; }
        
        .toggle-btn {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.06); }
        .toggle-btn.active { border-color: var(--primary); background: var(--primary-glow); }

        /* Main View */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .navbar {
            padding: 24px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            max-width: 400px;
        }
        input:focus { border-color: var(--primary); }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-primary:disabled { opacity: 0.5; }

        .content-area {
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 32px;
        }

        /* Results Panel */
        .result-card {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 40px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .section { margin-bottom: 32px; }
        .section-label { color: var(--primary); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 16px; opacity: 0.8; }
        .markdown-v { line-height: 1.8; color: var(--text); }
        .markdown-v p { margin-bottom: 16px; }
        .markdown-v strong { color: white; }

        .example-item {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border-left: 4px solid var(--primary);
            margin-bottom: 12px;
            font-style: italic;
        }

        .nuance-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            margin-right: 8px;
            margin-bottom: 8px;
            color: #c7d2fe;
        }

        /* Debug Panel */
        .debug-panel {
            display: none;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            padding: 24px;
            color: var(--accent);
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
        }
        .debug-panel.visible { display: block; }

        /* Loader */
        .loader {
            display: inline-flex;
            gap: 4px;
            margin-left: 10px;
        }
        .dot { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; animation: pulse 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 1; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">LexiVocab Node</div>
        
        <div class="config-group">
            <span class="config-label">Protocol Settings</span>
            <button class="toggle-btn active" id="jsonToggle">
                Structured JSON
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>
            </button>
            <button class="toggle-btn" id="streamViewToggle">
                Show Raw Node Data
            </button>
        </div>

        <div class="config-group" style="margin-top: auto;">
            <span class="config-label">Status</span>
            <div id="statusText" style="font-size: 0.8rem; color: var(--text-dim);">Ready for sync...</div>
        </div>
    </aside>

    <main class="main">
        <nav class="navbar">
            <input type="text" id="wordInput" value="ephemeral" placeholder="Ingest word cluster...">
            <button class="btn-primary" id="startBtn">
                <span>Analyze</span>
            </button>
            <div id="streamIndicator" class="loader" style="display: none;">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </nav>

        <div class="content-area">
            <div class="result-card">
                <div class="section">
                    <div class="section-label">Definition & Usage</div>
                    <div id="feat-explanation" class="markdown-v">---</div>
                </div>

                <div class="section">
                    <div class="section-label">Lexical Nuances</div>
                    <div id="feat-nuances"></div>
                </div>

                <div class="section">
                    <div class="section-label">Contextual Benchmarks</div>
                    <div id="feat-examples"></div>
                </div>

                <div class="section">
                    <div class="section-label">Pro Implementation Tip</div>
                    <div id="feat-tip" class="markdown-v">---</div>
                </div>
            </div>

            <pre id="debugPanel" class="debug-panel"></pre>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5000/api/v1/ai/explain-stream';
        const startBtn = document.getElementById('startBtn');
        const wordInput = document.getElementById('wordInput');
        
        // UI Control Toggles
        document.getElementById('streamViewToggle').addEventListener('click', (e) => {
            const panel = document.getElementById('debugPanel');
            panel.classList.toggle('visible');
            e.currentTarget.classList.toggle('active');
        });

        const elements = {
            explanation: document.getElementById('feat-explanation'),
            nuances: document.getElementById('feat-nuances'),
            examples: document.getElementById('feat-examples'),
            tip: document.getElementById('feat-tip'),
            debug: document.getElementById('debugPanel'),
            status: document.getElementById('statusText'),
            loader: document.getElementById('streamIndicator')
        };

        startBtn.addEventListener('click', async () => {
            const word = wordInput.value.trim();
            if (!word) return;

            resetUI();
            
            let fullJson = '';
            
            try {
                const url = `${API_BASE}?word=${encodeURIComponent(word)}&asJson=true`;
                const response = await fetch(url);
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.substring(6));
                            if (data.type === 'content') {
                                fullJson += data.delta;
                                elements.debug.textContent = fullJson;
                                elements.debug.scrollTop = elements.debug.scrollHeight;
                                incrementalParse(fullJson);
                            }
                        }
                    }
                }
                elements.status.textContent = 'Node synchronized successfully.';
            } catch (e) {
                elements.status.textContent = 'Node Error: ' + e.message;
            } finally {
                startBtn.disabled = false;
                elements.loader.style.display = 'none';
            }
        });

        function resetUI() {
            startBtn.disabled = true;
            elements.loader.style.display = 'inline-flex';
            elements.status.textContent = 'Connecting to AI node...';
            elements.explanation.textContent = 'Ingesting definition...';
            elements.tip.textContent = 'Waiting for pro data...';
            elements.nuances.innerHTML = '';
            elements.examples.innerHTML = '';
            elements.debug.textContent = '';
        }

        /**
         * Robust Incremental JSON Parser
         * Handles open strings and incomplete arrays mid-stream
         */
        function incrementalParse(json) {
            // 1. Explanation field (Markdown enabled)
            const exp = streamMatch(json, 'explanation');
            if (exp) elements.explanation.innerHTML = marked.parse(exp);

            // 2. Tip field
            const tip = streamMatch(json, 'tip');
            if (tip) elements.tip.innerHTML = marked.parse(tip);

            // 3. Nuances (Array of strings)
            const nuances = streamMatchArray(json, 'nuances');
            if (nuances.length) {
                elements.nuances.innerHTML = nuances.map(n => `<span class="nuance-badge">${n}</span>`).join('');
            }

            // 4. Examples (Array of strings)
            const examples = streamMatchArray(json, 'examples');
            if (examples.length) {
                elements.examples.innerHTML = examples.map(e => `<div class="example-item">${e}</div>`).join('');
            }
        }

        function streamMatch(json, key) {
            // Match "key": "value..." until next key or unescaped quote
            const regex = new RegExp(`"${key}"\\s*:\\s*"((?:[^"\\\\]|\\\\.)*)(?:"|$)`);
            const match = json.match(regex);
            return match ? clean(match[1]) : null;
        }

        function streamMatchArray(json, key) {
            // Match "key": ["item1", "item2"...]
            const regex = new RegExp(`"${key}"\\s*:\\s*\\[([\\s\\S]*?)(?:\\]|$)`);
            const match = json.match(regex);
            if (!match) return [];
            
            // Extract individual quoted strings within the array content
            const itemRegex = /"((?:[^"\\\\]|\\\\.)*)"/g;
            const items = [];
            let itemMatch;
            while ((itemMatch = itemRegex.exec(match[1])) !== null) {
                items.push(clean(itemMatch[1]));
            }
            return items;
        }

        function clean(str) {
            return str.replace(/\\n/g, '\n').replace(/\\"/g, '"');
        }
    </script>
</body>
</html>
