# ──────────────────────────────────────────────────────────────────
# LexiVocab Docker Compose — Full Stack Development Environment
# Usage: docker-compose up --build -d
#
# For production, override sensitive values with a .env file:
#   POSTGRES_PASSWORD=<strong-password>
#   JWT_SECRET=<random-256-bit-key>
#   SEQ_ADMIN_PASSWORD=<admin-password>
#   REDIS_PASSWORD=<redis-password>
# ──────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexivocab-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexivocab_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Uncomment for automated backups:
      # - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lexivocab_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ─── pgAdmin 4 (PostgreSQL GUI) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: lexivocab-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lexivocab.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    profiles:
      - tools # Only start with: docker-compose --profile tools up

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexivocab-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ─── SEQ (Logging & Observability) ───────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: lexivocab-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD:-admin_password_123!}
    ports:
      - "5341:5341" # Ingestion port
      - "8081:80"   # UI port

  # ─── LexiVocab API (.NET 10) ─────────────────────────────────
  api:
    build: .
    container_name: lexivocab-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://seq:5341/ingest/otlp/v1/logs
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-lexivocab_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres};Maximum Pool Size=100;Pooling=true
      - ConnectionStrings__Redis=${REDIS_PASSWORD:+redis:6379,password=}${REDIS_PASSWORD:-redis:6379}
      - Jwt__Secret=${JWT_SECRET:-LexiVocab_Docker_Secret_Key_Must_Be_At_Least_32_Characters_Long!}
      - Jwt__Issuer=LexiVocab.API
      - Jwt__Audience=LexiVocab.Clients
      - Jwt__AccessTokenExpiryMinutes=${JWT_EXPIRY_MINUTES:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

volumes:
  pgdata:
  redisdata:
  pgadmin-data:
