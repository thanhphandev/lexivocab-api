services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16.9-alpine3.21
    container_name: lexivocab-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lexivocab_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lexivocab_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lexivocab-network
      
  ngrok:
    image: ngrok/ngrok:3
    container_name: lexivocab-ngrok
    command:
      - "start"
      - "api"
      - "--config"
      - "/etc/ngrok.yml"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"  # Ngrok inspect UI: http://localhost:4040
    volumes:
      - ./ngrok-config.yml:/etc/ngrok.yml:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - lexivocab-network

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine3.21
    container_name: lexivocab-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then redis-server --requirepass "$$REDIS_PASSWORD"; else redis-server; fi'
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$$REDIS_PASSWORD' ping | grep PONG || redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - lexivocab-network

  # ─── SEQ (Logging & Observability) ───────────────────────────
  seq:
    image: datalust/seq:2024.3
    container_name: lexivocab-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD:-admin_password_123!}
    ports:
      - "5341:5341" # Ingestion port
      - "8899:80"   # UI port
    networks:
      - lexivocab-network

  # ─── pgAdmin 4 (Database Manager) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:9.1
    container_name: lexivocab-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lexivocab.store}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
      PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lexivocab-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── LexiVocab API (.NET 10) ─────────────────────────────────
  api:
    build: .
    container_name: lexivocab-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://seq:5341/ingest/otlp/v1/logs
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-lexivocab_dev};Username=${POSTGRES_USER:-postgres_app};Password=${POSTGRES_PASSWORD:-postgres};Maximum Pool Size=100;Pooling=true
      - ConnectionStrings__Redis=${REDIS_PASSWORD:+redis:6379,password=}${REDIS_PASSWORD:-redis:6379}
      - Jwt__Secret=${JWT_SECRET:-LexiVocab_Docker_Secret_Key_Must_Be_At_Least_32_Characters_Long!}
      - Jwt__Issuer=LexiVocab.API
      - Jwt__Audience=LexiVocab.Clients
      - Jwt__AccessTokenExpiryMinutes=${JWT_EXPIRY_MINUTES:-120}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_EXPIRY_DAYS:-30}
      - Jwt__RefreshTokenGracePeriodSeconds=${JWT_REFRESH_GRACE_PERIOD_SECONDS:-60}
      - Jwt__ClockSkewSeconds=${JWT_CLOCK_SKEW_SECONDS:-0}
      - AIProviders__DefaultProvider=${AI_DEFAULT_PROVIDER:-custom}
      - AIProviders__custom__BaseUrl=${AI_CUSTOM_BASE_URL}
      - AIProviders__custom__ApiKey=${AI_CUSTOM_API_KEY}
      - AIProviders__custom__DefaultModel=${AI_CUSTOM_DEFAULT_MODEL:-cx/gpt-5.4}
      - AIProviders__custom__MaxTokens=${AI_CUSTOM_MAX_TOKENS:-4096}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Smtp__Server=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__Username=${SMTP_USER}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__SenderName=${SMTP_SENDER_NAME}
      - Smtp__SenderEmail=${SMTP_SENDER_EMAIL}
      - Sepay__ApiKey=${SEPAY_API_KEY}
      - Sepay__ApiBaseUrl=${SEPAY_API_BASE_URL}
      - Sepay__QrTemplate=${SEPAY_QR_TEMPLATE}
      - Sepay__BankAccount=${SEPAY_BANK_ACCOUNT}
      - Sepay__BankName=${SEPAY_BANK_NAME}
      - PayPal__ClientId=${PAYPAL_CLIENT_ID}
      - PayPal__ClientSecret=${PAYPAL_CLIENT_SECRET}
      - PayPal__WebhookId=${PAYPAL_WEBHOOK_ID}
      - PayPal__ReturnUrl=${PAYPAL_RETURN_URL}
      - PayPal__CancelUrl=${PAYPAL_CANCEL_URL}
      - App__Url=${APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - lexivocab-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

volumes:
  pgdata:
  redisdata:
  pgadmin-data:

networks:
  lexivocab-network:
    driver: bridge
