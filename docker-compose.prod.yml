# ==============================================================================
# LexiVocab API — Production Docker Compose
# ==============================================================================
# Base template from docker-compose.yml
# ==============================================================================

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexivocab-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Internal access only in production
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lexivocab-network

  # ─── Redis 7 ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexivocab-redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: sh -c 'if [ -n "$REDIS_PASSWORD" ]; then redis-server --requirepass "$REDIS_PASSWORD"; else redis-server; fi'
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - lexivocab-network

  # ─── SEQ (Logging & Observability) ───────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: lexivocab-seq
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD}
    ports:
      - "5341:5341" # OTLP ingestion
      - "${SEQ_UI_PORT:-8899}:80"   # UI port
    networks:
      - lexivocab-network

  # ─── LexiVocab API (.NET 10) ─────────────────────────────────
  api:
    image: ${API_IMAGE:-lexivocab-api:latest}
    container_name: lexivocab-api
    restart: always
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://seq:5341/ingest/otlp/v1/logs
      
      # Database Connection Strings (Pool size tuned for production)
      - ConnectionStrings__DefaultConnection=Host=${POSTGRES_HOST:-postgres};Port=${POSTGRES_PORT:-5432};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Maximum Pool Size=${DB_MAX_POOL_SIZE:-25};Pooling=true;Connection Idle Lifetime=300
      
      # Redis Connection String (with retry for transient failures)
      - ConnectionStrings__Redis=${REDIS_HOST:-redis}:6379,password=${REDIS_PASSWORD},ssl=false,abortConnect=false,connectRetry=3
      
      # JWT Settings
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=LexiVocab.API
      - Jwt__Audience=LexiVocab.Clients
      - Jwt__AccessTokenExpiryMinutes=${JWT_EXPIRY_MINUTES:-120}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_EXPIRY_DAYS:-30}
      - Jwt__RefreshTokenGracePeriodSeconds=${JWT_REFRESH_GRACE_PERIOD_SECONDS:-60}
      - Jwt__ClockSkewSeconds=${JWT_CLOCK_SKEW_SECONDS:-0}
      
      # AI Providers
      - AIProviders__DefaultProvider=${AI_DEFAULT_PROVIDER:-custom}
      - AIProviders__custom__BaseUrl=${AI_CUSTOM_BASE_URL}
      - AIProviders__custom__ApiKey=${AI_CUSTOM_API_KEY}
      - AIProviders__custom__DefaultModel=${AI_CUSTOM_DEFAULT_MODEL:-cx/gpt-5.4}
      - AIProviders__custom__MaxTokens=${AI_CUSTOM_MAX_TOKENS:-4096}
      
      # External Services
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Smtp__Server=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USER}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__SenderName=${SMTP_SENDER_NAME:-LexiVocab Team}
      - Smtp__SenderEmail=${SMTP_SENDER_EMAIL}
      
      # Payment Gateway (SePay / PayPal)
      - Sepay__ApiKey=${SEPAY_API_KEY}
      - Sepay__ApiBaseUrl=${SEPAY_API_BASE_URL:-https://my.sepay.vn/api}
      - Sepay__QrTemplate=${SEPAY_QR_TEMPLATE:-https://qr.sepay.vn/img?acc={0}&bank={1}&amount={2}&des={3}}
      - Sepay__BankAccount=${SEPAY_BANK_ACCOUNT}
      - Sepay__BankName=${SEPAY_BANK_NAME}
      
      - PayPal__ClientId=${PAYPAL_CLIENT_ID}
      - PayPal__ClientSecret=${PAYPAL_CLIENT_SECRET}
      - PayPal__WebhookId=${PAYPAL_WEBHOOK_ID}
      - PayPal__ReturnUrl=${PAYPAL_RETURN_URL}
      - PayPal__CancelUrl=${PAYPAL_CANCEL_URL}
      
      # Core App Settings
      - App__Url=${APP_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE:-25}
      - HANGFIRE_WORKER_COUNT=${HANGFIRE_WORKER_COUNT:-2}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - lexivocab-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'

volumes:
  pgdata:
  redisdata:

networks:
  lexivocab-network:
    driver: bridge
