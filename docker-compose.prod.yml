# ==============================================================================
# LexiVocab API — Production Docker Compose
# ==============================================================================
#
# DÙNG: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Khác biệt so với docker-compose.yml (dev):
#   • Không expose PostgreSQL / Redis ra ngoài host (chỉ internal network)
#   • Không có pgAdmin, ngrok (không cần trên production)
#   • SEQ chỉ expose nội bộ (truy cập qua SSH tunnel)
#   • Tất cả secret được inject qua biến môi trường — KHÔNG có fallback default
#   • restart: always trên mọi service
#   • Resource limits thực tế cho production
#   • CORS chặt (không AllowAnyOrigin)
#   • Healthcheck đầy đủ với start_period cho container khởi động chậm
#   • Named volume riêng cho logs
# ==============================================================================

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lexivocab-db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Không expose ra ngoài — chỉ các service trong cùng network kết nối
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lexivocab-internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ─── Redis 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexivocab-redis
    restart: always
    # Password bắt buộc; giới hạn memory + eviction policy phù hợp cache
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - lexivocab-internal
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M

  # ─── SEQ (Log Aggregation) ──────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: lexivocab-seq
    restart: always
    environment:
      ACCEPT_EULA:                    "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD:     ${SEQ_ADMIN_PASSWORD}
    # Không expose ra internet — truy cập qua SSH tunnel:
    #   ssh -L 8081:localhost:8081 user@server
    expose:
      - "80"    # Web UI
      - "5341"  # OTLP ingestion
    volumes:
      - seqdata:/data
    networks:
      - lexivocab-internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── LexiVocab API (.NET 10) ─────────────────────────────────────
  api:
    image: ${API_IMAGE:-lexivocab-api:latest}
    container_name: lexivocab-api
    restart: always

    # ── Biến môi trường ────────────────────────────────────────────
    # Tất cả phải có trong .env.production — không có giá trị mặc định
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: Production

      # Database — PostgreSQL (cũng dùng cho Hangfire)
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};
        Password=${POSTGRES_PASSWORD};
        Maximum Pool Size=100;
        Minimum Pool Size=5;
        Pooling=true;
        Connection Idle Lifetime=300;
        Connection Pruning Interval=10

      # Redis — distributed cache & JWT revocation list
      ConnectionStrings__Redis: >-
        redis:6379,
        password=${REDIS_PASSWORD},
        ssl=false,
        abortConnect=false,
        connectTimeout=5000,
        syncTimeout=5000

      # Logging — đẩy về SEQ qua OTLP
      OTEL_EXPORTER_OTLP_ENDPOINT: http://seq:5341/ingest/otlp/v1/logs

      # JWT
      Jwt__Secret:                  ${JWT_SECRET}
      Jwt__Issuer:                  LexiVocab.API
      Jwt__Audience:                LexiVocab.Clients
      Jwt__AccessTokenExpiryMinutes: ${JWT_EXPIRY_MINUTES:-120}

      # CORS — phải khai báo domain thật, không được để trống
      Cors__AllowedOrigins__0:      ${CORS_ORIGIN_0}
      Cors__AllowedOrigins__1:      ${CORS_ORIGIN_1:-}

      # Google OAuth
      Google__ClientId:             ${GOOGLE_CLIENT_ID}
      Google__ClientSecret:         ${GOOGLE_CLIENT_SECRET}

      # SePay
      Sepay__ApiKey:                ${SEPAY_API_KEY}
      Sepay__BankAccount:           ${SEPAY_BANK_ACCOUNT}
      Sepay__BankName:              ${SEPAY_BANK_NAME}
      Sepay__ApiBaseUrl:            ${SEPAY_API_BASE_URL:-https://my.sepay.vn/api}
      Sepay__QrTemplate:            ${SEPAY_QR_TEMPLATE:-https://qr.sepay.vn/img?acc={0}&bank={1}&amount={2}&des={3}}

      # PayPal
      PayPal__ClientId:             ${PAYPAL_CLIENT_ID}
      PayPal__ClientSecret:         ${PAYPAL_CLIENT_SECRET}
      PayPal__BaseUrl:              https://api-m.paypal.com
      PayPal__ReturnUrl:            ${PAYPAL_RETURN_URL}
      PayPal__CancelUrl:            ${PAYPAL_CANCEL_URL}
      PayPal__WebhookId:            ${PAYPAL_WEBHOOK_ID}

      # Stripe
      Stripe__SecretKey:            ${STRIPE_SECRET_KEY}
      Stripe__PublishableKey:       ${STRIPE_PUBLISHABLE_KEY}
      Stripe__WebhookSecret:        ${STRIPE_WEBHOOK_SECRET}

      # SMTP Email
      Smtp__Server:                 ${SMTP_HOST}
      Smtp__Port:                   ${SMTP_PORT:-587}
      Smtp__Username:               ${SMTP_USER}
      Smtp__Password:               ${SMTP_PASSWORD}
      Smtp__SenderName:             ${SMTP_SENDER_NAME:-LexiVocab Team}
      Smtp__SenderEmail:            ${SMTP_SENDER_EMAIL}
      Smtp__UseSsl:                 "true"

      # App URL (dùng trong email templates, OAuth redirect)
      App__Url:                     ${APP_URL}

      # AI Providers
      AIProviders__DefaultProvider:          ${AI_DEFAULT_PROVIDER:-openrouter}
      AIProviders__openrouter__ApiKey:       ${OPENROUTER_API_KEY}
      AIProviders__openrouter__BaseUrl:      https://openrouter.ai/api/v1
      AIProviders__openrouter__DefaultModel: ${OPENROUTER_MODEL:-google/gemini-pro-1.5}
      AIProviders__openrouter__MaxTokens:    ${OPENROUTER_MAX_TOKENS:-4096}
      AIProviders__fireworks__ApiKey:        ${FIREWORKS_API_KEY:-}
      AIProviders__openai__ApiKey:           ${OPENAI_API_KEY:-}

      # Cloudflare AI Worker
      CloudflareAI__ApiKey:       ${CLOUDFLARE_AI_API_KEY}
      CloudflareAI__WorkerUrl:    ${CLOUDFLARE_AI_WORKER_URL}

      # Trust headers từ Nginx reverse proxy
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started

    # Nginx kết nối qua internal network, không expose port ra ngoài
    expose:
      - "8080"

    volumes:
      - api-logs:/app/logs

    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          wget --no-verbose --tries=1 --spider http://localhost:8080/health \
          || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - lexivocab-internal

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  seqdata:
    driver: local
  api-logs:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  lexivocab-internal:
    driver: bridge
    # Không cần internal: true vì API cần gọi ra internet (payment webhooks, AI)
