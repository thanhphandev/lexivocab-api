    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #0b0f1a;
            --card-bg: rgba(21, 28, 45, 0.8);
            --sidebar-bg: rgba(15, 23, 42, 0.95);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav { flex: 1; }
        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: white;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .content-wrap {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p { color: var(--text-dim); }

        .search-area {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            gap: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.3); }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; filter: grayscale(1); }

        .result-area {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            min-height: 300px;
            line-height: 1.7;
            position: relative;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .markdown-body { font-size: 1.05rem; }
        .markdown-body h2 { margin: 24px 0 12px; color: var(--primary-light); font-size: 1.4rem; font-family: 'Outfit', sans-serif; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body ul { margin-bottom: 16px; padding-left: 20px; }
        .markdown-body li { margin-bottom: 8px; }
        .markdown-body strong { color: white; }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--primary);
            margin-left: 4px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 0 10px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">L</div>
            LexiVocab
        </div>
        <div class="nav">
            <div class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                AI Assistant
            </div>
            <div class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                My Library
            </div>
            <div class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="content-wrap">
            <header>
                <h1>AI Analysis</h1>
                <p>Full-fledged JSON Streaming with Markdown Pro</p>
            </header>

            <div class="search-area">
                <input type="text" id="wordInput" placeholder="Analyze word..." value="eloquent">
                <button id="streamBtn">
                    <span>Analyze</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </button>
            </div>

            <div class="result-area">
                <div id="outputText" class="markdown-body" style="color: var(--text-dim);">Ready for your input...</div>
                <span id="cursor" class="cursor" style="display: none;"></span>
            </div>

            <div class="status-bar">
                <div id="statusText">System: Idle</div>
                <div id="latencyText" class="badge" style="display:none;"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const wordInput = document.getElementById('wordInput');
        const streamBtn = document.getElementById('streamBtn');
        const outputText = document.getElementById('outputText');
        const cursor = document.getElementById('cursor');
        const statusText = document.getElementById('statusText');
        const latencyText = document.getElementById('latencyText');

        const API_BASE = 'http://localhost:5000/api/v1/ai/explain-stream'; 

        streamBtn.addEventListener('click', async () => {
            const word = wordInput.value.trim();
            if (!word) return;

            let fullMarkdown = '';
            outputText.innerHTML = '';
            outputText.style.color = 'var(--text-main)';
            cursor.style.display = 'inline-block';
            streamBtn.disabled = true;
            statusText.textContent = 'System: Initializing stream';
            latencyText.style.display = 'none';
            
            const startTime = performance.now();
            let firstChunk = true;

            try {
                const response = await fetch(`${API_BASE}?word=${encodeURIComponent(word)}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        
                        try {
                            const payload = JSON.parse(line.slice(6));
                            
                            switch(payload.type) {
                                case 'start':
                                    statusText.textContent = `System: Analyzing "${payload.word}"`;
                                    break;
                                    
                                case 'content':
                                    if (firstChunk) {
                                        latencyText.textContent = `TTFB: ${Math.round(performance.now() - startTime)}ms`;
                                        latencyText.style.display = 'block';
                                        statusText.textContent = 'System: Generating response';
                                        firstChunk = false;
                                    }
                                    fullMarkdown += payload.delta;
                                    outputText.innerHTML = marked.parse(fullMarkdown);
                                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                                    break;
                                    
                                case 'done':
                                    statusText.textContent = 'System: Analysis complete';
                                    cursor.style.display = 'none';
                                    break;
                                    
                                case 'error':
                                    throw new Error(payload.message);
                            }
                        } catch (e) {
                            console.warn('Chunk processing error:', e);
                        }
                    }
                }
            } catch (error) {
                outputText.innerHTML = `<p style="color: #ef4444;">**Error**: ${error.message}</p>`;
                statusText.textContent = 'System: Connection failed';
                cursor.style.display = 'none';
            } finally {
                streamBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
